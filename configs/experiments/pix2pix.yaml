# Pix2Pix experiment overrides
project:
  name: pix2pix-thermal-colorization
  seed: 42

data:
  image_size: [256, 256]
  num_workers: 4
  batch_size: 4

model:
  architecture: pix2pix
  in_channels: 1
  out_channels: 3
  ngf: 64
  ndf: 64
  n_layers: 3
  use_dropout: true

training:
  epochs: 200
  lr: 0.0002
  beta1: 0.5
  lambda_l1: 100.0
  save_every: 10
  checkpoint_dir: models/weights

inference:
  device: auto
  checkpoint: models/weights/colorization.pt
